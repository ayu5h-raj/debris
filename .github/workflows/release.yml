name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: debris-macos-arm64
          - target: x86_64-apple-darwin
            artifact: debris-macos-intel

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p debris-app
          cargo build --release --target ${{ matrix.target }} -p debris-tui

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          TARGET=${{ matrix.target }}
          ARTIFACT=${{ matrix.artifact }}

          # Package debris (GUI)
          tar -czf "${ARTIFACT}-${VERSION}.tar.gz" -C "target/${TARGET}/release" debris
          shasum -a 256 "${ARTIFACT}-${VERSION}.tar.gz" > "${ARTIFACT}-${VERSION}.tar.gz.sha256"

          # Package debris-cli
          tar -czf "${ARTIFACT}-cli-${VERSION}.tar.gz" -C "target/${TARGET}/release" debris-cli
          shasum -a 256 "${ARTIFACT}-cli-${VERSION}.tar.gz" > "${ARTIFACT}-cli-${VERSION}.tar.gz.sha256"

          echo "Done packaging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.sha256
          generate_release_notes: true
